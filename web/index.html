<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <script src="index.js" defer></script>
    <title>Poker Game</title>
</head>

<body>
<div class="wrapper">
    <header class="page-header">
        <h1 class="page-title">
            &nbsp;Poker Game&nbsp;
        </h1>


    </header>
        <div class="game-info">
            <h2 id="action-line">  &nbsp;Press Start Game&nbsp;</h2>
        </div>
    <main class="page-main">

        <section id="P1">

        <div class="cards">

                        <div class="card p1" data-value="0" data-index="0" onclick="toggleCard(this)">
                            <img id="card0" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                            <img id="hold0" class="hide hold-img" src="PNG-cards-1.3/hold.png" alt="Overlay Hold Image">
                        </div>

                        <div class="card p1" data-value='0' data-index="1" onclick="toggleCard(this)">
                            <img id="card1" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                            <img id="hold1" class="hide hold-img" src="PNG-cards-1.3/hold.png" alt="Overlay Hold Image">

                        </div>


                        <div class="card p1" data-value='0' data-index="2" onclick="toggleCard(this)">
                            <img id="card2" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                            <img id="hold2" class="hide hold-img" src="PNG-cards-1.3/hold.png" alt="Overlay Hold Image">

                        </div>

                        <div class="card p1" data-value='0' data-index="3" onclick="toggleCard(this)">
                            <img id="card3" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                            <img id="hold3" class="hide hold-img" src="PNG-cards-1.3/hold.png" alt="Overlay Hold Image">

                        </div>

                        <div class="card p1" data-value='0' data-index="4" onclick="toggleCard(this)">
                            <img id="card4" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                            <img id="hold4" class="hide hold-img" src="PNG-cards-1.3/hold.png" alt="Overlay Hold Image">

                        </div>
        </div>
                        <div class="info">

            <div class="player-name">
                <h4> P1 </h4>
            </div>
            <div class="player-info">


            <div class="switch-btn">
                <button id='switch-btn' data-value="" class='button button-white'> Switch </button>
            </div>

            <div class="start-btn">
                <button id="start-btn" class="button button-white">Start Game</button>
            </div>
            </div>
            </div>
        </section>

        <section id="P2">

        <div class="cards">

                        <div class="card">
                            <img id="bot-card0" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>

                        <div class="card">
                            <img id="bot-card1" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>

                        <div class="card">
                            <img id="bot-card2" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>

                        <div class="card">
                            <img id="bot-card3" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>

                        <div class="card">
                            <img id="bot-card4" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>
        </div>
            <div class="player-name"> <h4> P2(bot) </h4> </div>

        </section>

        <section id="P3">

        <div class="cards">

                        <div class="card">
                            <img  id="bot2-card0" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>

                        <div class="card">
                            <img id="bot2-card1" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>

                        <div class="card">
                            <img id="bot2-card2" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>

                        <div class="card">
                            <img id="bot2-card3" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>

                        <div class="card">
                            <img id="bot2-card4" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>
        </div>
            <div class="player-name"> <h4> P3(bot) </h4> </div>

        </section>

        <section id="P4">

            <div class="cards">

                        <div class="card">
                            <img  id="bot3-card0" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>

                        <div class="card">
                            <img id="bot3-card1" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>

                        <div class="card">
                            <img id="bot3-card2" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>

                        <div class="card">
                            <img id="bot3-card3" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>

                        <div class="card">
                            <img id="bot3-card4" class="cardImg" src="PNG-cards-1.3/backside.png" alt="">
                        </div>
            </div>
            <div class="player-name"> <h4> P4(bot) </h4> </div>

        </section>

    </main>
    <footer class="page-footer">
        <p> Made by Ilkka Löfman </p>
    </footer>
</div>

</body>

</html>
